kind = "web"
previewPath = "/"
title = "ScanX Pro"
version = "1.0.0"
id = "artifacts/scanx-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22369

[services.development]
run = "pnpm --filter @workspace/scanx-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scanx-pro", "run", "build" ]
publicDir = "artifacts/scanx-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22369"
BASE_PATH = "/"
